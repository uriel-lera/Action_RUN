name: Verify and Build Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting or lint errors
        run: npm run lint

      - name: Check TypeScript errors
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
